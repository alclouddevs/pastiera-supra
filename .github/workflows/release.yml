name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name, e.g. 0.85"
        required: true
        type: string
      version_code:
        description: "Version code, e.g. 85"
        required: true
        type: string
      create_github_release:
        description: "Create a GitHub release and attach the APK"
        required: true
        default: false
        type: boolean

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          PASTIERA_KEYSTORE_B64: ${{ secrets.PASTIERA_KEYSTORE_B64 }}
        run: |
          mkdir -p release
          echo "$PASTIERA_KEYSTORE_B64" | base64 -d > release/pastiera-release.jks

      - name: Create keystore.properties
        env:
          PASTIERA_KEYSTORE_PASSWORD: ${{ secrets.PASTIERA_KEYSTORE_PASSWORD }}
          PASTIERA_KEY_ALIAS: ${{ secrets.PASTIERA_KEY_ALIAS }}
          PASTIERA_KEY_PASSWORD: ${{ secrets.PASTIERA_KEY_PASSWORD }}
        run: |
          cat > release/keystore.properties <<EOF
          storeFile=pastiera-release.jks
          storePassword=$PASTIERA_KEYSTORE_PASSWORD
          keyAlias=$PASTIERA_KEY_ALIAS
          keyPassword=$PASTIERA_KEY_PASSWORD
          EOF

      - name: Run stable unit tests
        run: |
          ./gradlew :app:testStableDebugUnitTest \
            -PPASTIERA_VERSION_CODE=${{ inputs.version_code }} \
            -PPASTIERA_VERSION_NAME=${{ inputs.version_name }}

      - name: Build release APK
        run: |
          ./gradlew :app:assembleStableRelease \
            -PPASTIERA_VERSION_CODE=${{ inputs.version_code }} \
            -PPASTIERA_VERSION_NAME=${{ inputs.version_name }}

      - name: Verify APK signing
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/apksigner" verify --print-certs app/build/outputs/apk/stable/release/app-stable-release.apk

      - name: Compute checksums
        run: sha256sum app/build/outputs/apk/stable/release/app-stable-release.apk | tee app/build/outputs/apk/stable/release/app-stable-release.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastiera-${{ inputs.version_name }}-release
          path: |
            app/build/outputs/apk/stable/release/app-stable-release.apk
            app/build/outputs/apk/stable/release/app-stable-release.apk.sha256

      - name: Create GitHub release
        if: ${{ inputs.create_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: Pastiera v${{ inputs.version_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/stable/release/app-stable-release.apk
            app/build/outputs/apk/stable/release/app-stable-release.apk.sha256
